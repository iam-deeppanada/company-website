# # Pre-setup Required:
# # ------------------
# # 1. AWS Account is required.
# # 2. Create an IAM user for GitHub Actions with the following policy:
# #    - AmazonEC2ContainerRegistryFullAccess
# #    - AmazonECSFullAccess (if deploying to ECS)
# # 3. In GitHub, go to your repository:
# #    Settings -> Secrets and variables -> Actions -> New repository secret
# #    Add the following secrets:
# #      - AWS_ACCESS_KEY_ID
# #      - AWS_SECRET_ACCESS_KEY
# #      - AWS_ACCOUNT_ID
# #      - AWS_REGION
# #
# # 4. Configure the environment variables in this workflow (replace values as needed):
# #    ECR AWS_REGION: <your-aws-region>
# #    ACCOUNT_ID: <your-aws-account-id>
# #    ECR_REPOSITORY: <your-ecr-repo-name>
# #    ECS_CLUSTER: <your-ecs-cluster-name>
# #    ECS_SERVICE: <your-ecs-service-name>
# #    TASK_DEFINITION: <your-ecs-task-definition-name>

name: CI-CD with ECS Deployment (Disabled)

on:
  workflow_dispatch:

jobs:
  disabled:
    runs-on: ubuntu-latest
    steps:
      - run: echo "This workflow is disabled"

