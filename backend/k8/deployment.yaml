apiVersion: apps/v1
kind: Deployment
metadata:
  name: company-website-deployment
  labels:
    app: company-website
spec:
  replicas: 1
  selector:
    matchLabels:
      app: company-website
  template:
    metadata:
      labels:
        app: company-website
    spec:
      containers:
      - name: company-website-container
        image: <AWS_ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/company-website:latest
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: company-website-service
spec:
  type: NodePort
  selector:
    app: company-website
  ports:
  - port: 80
    targetPort: 5000
    nodePort: 30007