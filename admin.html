<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<style>

body{
font-family: Arial;
margin:40px;
background:#f4f4f4;
}

h1{
text-align:center;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:12px;
border:1px solid #ddd;
text-align:left;
}

th{
background:#333;
color:white;
}

</style>

</head>

<body>

<h1>Customer Enquiries</h1>

<table id="contactsTable">

<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Subject</th>
<th>Message</th>
</tr>
</thead>

<tbody>
</tbody>

</table>

<script>

fetch("http://13.221.180.241:5000/admin")
.then(response => response.json())
.then(data => {

const table = document.querySelector("#contactsTable tbody")

table.innerHTML = ""

data.contacts.forEach(contact => {

const row = `
<tr>
<td>${contact.name}</td>
<td>${contact.email}</td>
<td>${contact.phone}</td>
<td>${contact.subject}</td>
<td>${contact.message}</td>
</tr>
`

table.innerHTML += row

})

})
.catch(error => {
console.error("Error loading contacts:", error)
})

</script>

</body>
</html>
